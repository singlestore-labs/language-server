name: Publish Release Assets

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name from singlestore/language-server to publish'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info from source repository
        id: get_release
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag_name || github.event.client_payload.tag_name }}
        run: |
          # Fetch release information from singlestore/language-server
          echo "Fetching release info for tag: ${TAG_NAME}"

          RELEASE_INFO=$(gh api repos/singlestore/language-server/releases/tags/${TAG_NAME})

          # Extract release details
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')
          RELEASE_BODY=$(echo "$RELEASE_INFO" | jq -r '.body')
          IS_PRERELEASE=$(echo "$RELEASE_INFO" | jq -r '.prerelease')
          IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.draft')

          # Save to outputs
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "is_draft=${IS_DRAFT}" >> $GITHUB_OUTPUT

          # Save release body to a file (to handle multiline)
          echo "$RELEASE_BODY" > release_body.txt

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag_name || github.event.client_payload.tag_name }}
        run: |
          # Create directory for assets
          mkdir -p release_assets

          # Get all assets from the release
          gh api repos/singlestore/language-server/releases/tags/${TAG_NAME} > release_info.json

          # Extract asset information - get name and browser_download_url
          # GitHub automatically creates "Source code (zip)" and "Source code (tar.gz)" assets
          # We need to exclude these by checking the name pattern
          jq -r '.assets[] | "\(.name)|\(.browser_download_url)"' release_info.json | \
          while IFS='|' read -r name url; do
            # Skip assets that look like source code archives
            if [[ "$name" =~ ^Source\ code\ \((zip|tar\.gz)\)$ ]]; then
              echo "Skipping auto-generated source code archive: $name"
              continue
            fi

            # Sanitize filename to prevent path traversal
            safe_name=$(basename "$name")
            if [[ "$safe_name" != "$name" ]] || [[ "$safe_name" == *".."* ]]; then
              echo "Warning: Skipping asset with unsafe name: $name"
              continue
            fi

            # Download the asset
            echo "Downloading asset: $safe_name from $url"
            curl -L -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/octet-stream" \
              -o "release_assets/$safe_name" "$url"
          done

          # Clean up
          rm -f release_info.json

          # List downloaded files
          echo "Downloaded assets:"
          ls -lh release_assets/ || echo "No assets downloaded"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag_name || github.event.client_payload.tag_name }}
          RELEASE_NAME: ${{ steps.get_release.outputs.release_name }}
          IS_PRERELEASE: ${{ steps.get_release.outputs.is_prerelease }}
          IS_DRAFT: ${{ steps.get_release.outputs.is_draft }}
        run: |
          # Check if release already exists
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists, deleting it first"
            if ! gh release delete "${TAG_NAME}" --yes; then
              echo "Warning: Failed to delete existing release, continuing anyway"
            fi
          fi

          # Check if tag exists
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists locally"
          else
            # Create lightweight tag pointing to current HEAD
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

          # Create release with options (avoiding eval for security)
          RELEASE_CMD=(gh release create "${TAG_NAME}" --title "${RELEASE_NAME}" --notes-file release_body.txt)

          if [ "${IS_PRERELEASE}" = "true" ]; then
            RELEASE_CMD+=(--prerelease)
          fi

          if [ "${IS_DRAFT}" = "true" ]; then
            RELEASE_CMD+=(--draft)
          fi

          # Create the release
          "${RELEASE_CMD[@]}"

          # Upload assets if any exist
          if [ -d "release_assets" ] && [ "$(ls -A release_assets)" ]; then
            echo "Uploading assets..."
            gh release upload "${TAG_NAME}" release_assets/*
          else
            echo "No assets to upload"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf release_assets
          rm -f release_body.txt
